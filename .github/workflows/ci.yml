name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  validate:
    name: Lint, Test, Validate Schema
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Check i18n keys
        run: npm run check:i18n

      - name: Test
        run: npm test

  integration:
    name: Integration Tests (Postgres + RLS)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: herd_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/herd_ci
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/herd_ci
      # herd_app (NOBYPASSRLS) — the runtime client exercises real RLS policies.
      RUNTIME_DATABASE_URL: postgresql://herd_app:herd_app_ci@localhost:5432/herd_ci

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Apply migrations
        run: npx prisma migrate deploy

      - name: Bootstrap herd_app role + enable RLS
        run: |
          psql "$DIRECT_URL" -v ON_ERROR_STOP=1 -f scripts/ci/bootstrap-ci-role.sql
          psql "$DIRECT_URL" -v ON_ERROR_STOP=1 -f scripts/enable-rls.sql

      - name: Seed baseline data
        run: |
          npm run seed:role-permissions
          npm run db:seed:ledger
          npm run seed:ci-integration

      - name: Run integration tests
        run: npm run test:integration
